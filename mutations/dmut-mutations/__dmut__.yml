
# yaml-embedded-languages: sql

__namespace: __dmut__

dmut:
  sql:
    - |
      create schema __dmut__;

dmut.mutations:
  sql:
    - |
      create type __dmut__.mutation_statement as (
        up text,
        down text
      );

      create table __dmut__.mutations (
        name text not null,
        namespace text not null,
        file text not null,

        needs text[] not null,
        meta_needs text[] not null,
        sql __dmut__.mutation_statement[] not null,
        meta __dmut__.mutation_statement[] not null,
        test __dmut__.mutation_statement[] not null,

        ts timestamp with time zone not null default now(),
        forced boolean not null default false,

        primary key (namespace, name)
      );

dmut.roles:
  sql:
    - |
      create table __dmut__.roles (
        name text not null,
        namespace text not null,

        ts timestamp with time zone not null default now(),
        forced boolean not null default false,

        primary key (namespace, name)
      );

dmut.revisions:
  sql:
    - |
      create table __dmut__.revisions (
        sequence int not null,
        namespace text not null,

        ts timestamp with time zone not null default now(),
        file_contents text not null default '',

        primary key (namespace, sequence)
      );