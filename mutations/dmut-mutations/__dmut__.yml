# yaml-embedded-languages: sql

__namespace: __dmut__

dmut:
  sql:
    - |
      create schema __dmut__;

dmut.mutations:
  sql:
    - |
      create type __dmut__.mutation_statement as (
        up text,
        down text
      );

    - |
      create table __dmut__.mutations (
        name text not null,
        namespace text not null,
        file text not null,
        revision int not null,

        needs text[] not null,
        meta_needs text[] not null,
        sql __dmut__.mutation_statement[] not null,
        meta __dmut__.mutation_statement[] not null,

        ts timestamp with time zone not null default now(),
        overriden boolean not null default false,

        primary key (namespace, name)
      );
